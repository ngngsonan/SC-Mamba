# ======================================================================
# Config B — Stronger training, closer to Mamba4Cast (arxiv:2410.09385)
# ======================================================================
# KEY DIFFERENCES from config.batch_ddp.yaml:
#   - mamba2: true  → Mamba SSM v2 blocks (DIFFERENT ARCHITECTURE → new ckpt)
#   - sub_day: true → Sub-daily time encoding (important for hourly datasets)
#   - context_len: 323 (30–323 range, was 128)
#   - training_rounds: 2000, num_epochs: 50 (~40× more compute than baseline)
#   - pred_len_sample: true (sample from 10–60 instead of fixed)
# ⚠️  Cannot resume from mamba2=False checkpoints (architecture differs)
# ======================================================================

seed: 42
debugging: false
scaler: min_max
sin_pos_enc: false
sin_pos_const: false
sub_day: true           # ← Enable sub-daily encoding (hourly/daily datasets)
encoding_dropout: 0.1
handle_constants_model: true
num_assets: 1

ssm_config:
  bidirectional: false
  enc_conv: true
  init_dil_conv: true
  enc_conv_kernel: 5
  init_conv_kernel: 5
  init_conv_max_dilation: 3
  global_residual: false
  in_proj_norm: false
  initial_gelu_flag: true
  linear_seq: 15
  mamba2: true           # ← Mamba SSM v2 (matches Mamba4Cast paper config)
  norm: true
  norm_type: layernorm
  num_encoder_layers: 2
  d_state: 128
  residual: false
  token_embed_len: 1024
  block_expansion: 2
  chunk_size: 256        # Mamba2 SSD kernel chunk size; encode_temporal pads seq_len to ≥2×chunk_size (nchunks≥2)
  headdim: 128           # CRITICAL: must be >= max(BLOCK_SIZE_M)=128; headdim=64 (default) → partial Triton blocks → LLVM crash

# Training schedule
training_rounds: 2000    # ← 8× more than baseline (was 250)
validation_rounds: 500   # ← 2× more than baseline (was 250)
num_epochs: 50           # ← 5× more than baseline (was 10)
batch_size: 64
real_test_interval: 5    # validate on real data every 5 epochs

# Learning rate
lr_scheduler: cosine_warm_restarts
initial_lr: 0.00001
learning_rate: 0.0000001
t_max: 300               # T_0 for CosineAnnealingWarmRestarts (warmup cycle length)

# Context/prediction lengths — matches Mamba4Cast paper
context_len: 323
min_seq_len: 30
max_seq_len: 323
pred_len_sample: true   # ← Sample prediction length from [pred_len_min, pred_len]
pred_len_min: 10
pred_len: 60

# Loss
loss: nll               # ← NLL for probabilistic forecasting (was mse)
multipoint: true
sample_multi_pred: 0.5

# Checkpoint path (set model_prefix to Google Drive on Colab)
version: v_b_mamba2
model_prefix: models     # override to /content/drive/MyDrive/... on Colab
wandb: false
continue_training: false

# Real validation datasets (same 17 as Mamba4Cast Table 3)
real_test_datasets:
  - nn5_daily_without_missing
  - nn5_weekly
  - covid_deaths
  - weather
  - hospital
  - fred_md
  - car_parts_without_missing
  - traffic
  - m3_monthly
  - ercot
  - m1_monthly
  - m1_quarterly
  - cif_2016
  - exchange_rate
  - m3_quarterly
  - tourism_monthly
  - tourism_quarterly

prior_config:
  prior_mix_frac: 0.7
  curriculum_learning: false
  mixup_prob: 0.0
  mixup_series: 4
  damp_and_spike: true
  damping_noise_ratio: 0.05
  spike_noise_ratio: 0.05
  spike_signal_ratio: 0.05
  spike_batch_ratio: 0.05
  fp_options:
    linear_random_walk_frac: 0
    seasonal_only: false
    scale_noise: [0.6, 0.3]
    trend_exp: false
    harmonic_scale_ratio: 0.4
    harmonic_rate: 0.75
    trend_additional: true
    transition_ratio: 0.0
  gp_prior_config:
    max_kernels: 6
    likelihood_noise_level: 0.4
    noise_level: random
    use_original_gp: false
    gaussians_periodic: true
    peak_spike_ratio: 0.1
    subfreq_ratio: 0.2
    periods_per_freq: 0.5
    gaussian_sampling_ratio: 0.2
    kernel_periods: [4, 5, 7, 21, 24, 30, 60, 120]
    max_period_ratio: 1.0
    kernel_bank:
      matern_kernel: 1.5
      linear_kernel: 1
      periodic_kernel: 5
      polynomial_kernel: 0
      spectral_mixture_kernel: 0
